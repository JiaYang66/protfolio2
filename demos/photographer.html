<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>苏晴 · Portrait Photographer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0eb;--text:#2c2416;--muted:#8c7b6b;--accent:#c4754b}
body{font-family:"Georgia","Noto Serif SC","STSong",serif;background:var(--bg);color:var(--text)}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem}
.hero h1{font-size:4rem;font-weight:400;letter-spacing:12px;color:#1a1008}
.hero .sub{font-size:1rem;color:var(--muted);letter-spacing:4px;margin:.8rem 0 2rem;font-style:italic}
.hero .contact{font-size:.8rem;color:var(--muted);letter-spacing:1px;margin-bottom:1.5rem}
.section{text-align:center;padding:4rem 1.5rem;max-width:1100px;margin:0 auto}
.section h2{font-size:1.6rem;font-weight:400;letter-spacing:4px;margin-bottom:2rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
@media(max-width:768px){.grid3{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:2.4rem}}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:768px){.grid4{grid-template-columns:repeat(2,1fr)}}
.p-card{aspect-ratio:3/4;border-radius:4px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid #e8ddd0;background:#e8ddd0}
.p-card:hover{opacity:.88;transform:scale(1.01)}
.p-card img{width:100%;height:100%;object-fit:cover}
.v-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1.2rem}
.v-card{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.04);border:1px solid #e8ddd0}
.v-card .player{aspect-ratio:16/9;position:relative;background:#e8ddd0}
.v-card .player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.v-card .info{padding:.8rem 1rem;text-align:left}
.v-card .info h3{font-size:.9rem;font-weight:400;margin-bottom:2px}
.v-card .info p{font-size:.75rem;color:var(--muted)}
.desc{max-width:500px;margin:0 auto 2rem;font-size:.9rem;color:var(--muted);line-height:2;font-style:italic}
.footer{text-align:center;padding:3rem;color:var(--muted);font-size:.75rem;letter-spacing:2px}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:100;align-items:center;justify-content:center;cursor:zoom-out}
.lb.on{display:flex}.lb img{max-width:90%;max-height:90%;border-radius:2px}
.lb .x{position:absolute;top:2rem;right:2.5rem;font-size:2.5rem;color:#999;cursor:pointer}
@media(max-width:768px){.v-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hero">
  <h1>苏 晴</h1>
  <p class="sub">Portrait Photographer · 捕捉真实的情绪与光</p>
  <div class="contact">177-0000-0004 · suqing@photo.cn · 上海</div>
</div>

<div class="section">
  <h2>婚礼纪实</h2>
  <div class="grid3" id="g1"></div>
</div>

<div class="section">
  <h2>人像写真</h2>
  <div class="grid4" id="g2"></div>
</div>

<div class="section">
  <h2>旅行随拍</h2>
  <div class="grid3" id="g3"></div>
</div>

<div class="section">
  <h2>影像短片</h2>
  <div class="v-grid">
    <div class="v-card"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV12287e8E9M&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="info"><h3>新疆旅行结婚MV — 愿我们永远自由</h3><p>3:37 · 4K</p></div></div>
    <div class="v-card"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1mnTxzJEwf&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="info"><h3>50mm定焦 — 电影感人像写真</h3><p>6:32 · 索尼A7R5</p></div></div>
    <div class="v-card"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1d7xneGEDk&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="info"><h3>万能摆姿引导 — 实拍教学</h3><p>6:42</p></div></div>
    <div class="v-card"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1bDyNYJEb2&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="info"><h3>电影布光幕后 — DYSTOPIA 花絮</h3><p>5:11</p></div></div>
  </div>
</div>

<div class="section">
  <h2>关于</h2>
  <p class="desc">专注人像摄影六年。擅长自然光人像、婚礼跟拍与商业肖像。每张照片背后都是一个独特的故事，我的工作是让它被看见。</p>
</div>

<div class="footer">SU QING © 2026</div>

<div class="lb" id="lb" onclick="this.classList.remove('on')"><span class="x">&times;</span><img id="lbImg"></div>

<script>
const base = '../photos/产品拍摄/';
const items = [
  ['g1','未命名_1.1.1.jpg,未命名_1.2.1.jpg,未命名_1.3.1.jpg'],
  ['g2','未命名_1.4.1.jpg,未命名_1.5.1.jpg,未命名_1.5.2.jpg,未命名_1.6.1.jpg'],
  ['g3','未命名_1.7.1.jpg,未命名_1.8.1.jpg,未命名_1.10.1.jpg'],
];

items.forEach(([id, files]) => {
  const el = document.getElementById(id);
  files.split(',').forEach(f => {
    const src = base + f;
    const d = document.createElement('div');
    d.className = 'p-card';
    d.onclick = () => { document.getElementById('lbImg').src = src; document.getElementById('lb').classList.add('on'); };
    d.innerHTML = '<img src="' + src + '" loading=lazy onerror="this.parentElement.remove()">';
    el.appendChild(d);
  });
});
</script>
</body>
</html>
