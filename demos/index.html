<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>作品集模板展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0d1117;color:#c9d1d9;padding:2rem}
.container{max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:1.5rem;margin-bottom:.5rem;color:#58a6ff}
.sub{text-align:center;color:#8b949e;margin-bottom:2rem;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;transition:.3s;text-decoration:none;color:inherit;cursor:pointer}
.card:hover{border-color:#58a6ff;transform:translateY(-4px);box-shadow:0 12px 40px rgba(88,166,255,.08)}
.card .preview{height:160px;position:relative;overflow:hidden}
.card .info{padding:1rem 1.1rem}
.card .info h2{font-size:1rem;color:#58a6ff;margin-bottom:4px}
.card .info p{font-size:.78rem;color:#8b949e;line-height:1.5}

/* Designer preview */
.p1{background:#fafafa}
.p1 .mock{position:absolute;top:20px;left:20px;right:20px}
.p1 .mock-bar{height:8px;background:#6c5ce7;border-radius:4px;width:40%;margin-bottom:12px}
.p1 .mock-row{display:flex;gap:10px;margin-bottom:8px}
.p1 .mock-box{height:60px;background:#fff;border-radius:8px;flex:1;border:1px solid #eee;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.p1 .mock-box:nth-child(2){background:#f5f0ff;border-color:#e8e0ff}
.p1 .mock-dots{display:flex;gap:6px;position:absolute;bottom:20px;left:20px}
.p1 .mock-dots span{width:6px;height:6px;border-radius:50%;background:#6c5ce7}
.p1 .mock-dots span:nth-child(2),.p1 .mock-dots span:nth-child(3){background:#ddd}

/* Editor preview */
.p2{background:linear-gradient(135deg,#0a0a0c 0%,#111 50%,#1a1000 100%)}
.p2 .film{position:absolute;top:12px;left:20px;right:20px;bottom:12px}
.p2 .film .strip{display:flex;gap:8px;height:50px}
.p2 .film .frame{flex:1;background:#1a1a1a;border-radius:2px;border:1px solid #333}
.p2 .film .frame:nth-child(2){background:#1a1200;border-color:#f0a50033}
.p2 .film .timeline{height:2px;background:#333;margin:12px 0;position:relative}
.p2 .film .timeline::after{content:'';position:absolute;left:30%;top:-2px;width:6px;height:6px;background:#f0a500;border-radius:50%}
.p2 .film .scrub{height:14px;background:#1a1a1a;border-radius:3px;border:1px solid #333;margin-top:6px;position:relative}
.p2 .film .scrub::after{content:'';position:absolute;left:20%;top:0;bottom:0;width:40%;background:#f0a50022;border-radius:2px;border-left:1px solid #f0a500;border-right:1px solid #f0a500}
.p2 .badge{position:absolute;top:16px;right:22px;border:1px solid #f0a500;color:#f0a500;font-size:.55rem;padding:2px 6px;letter-spacing:1px}

/* Dev preview */
.p3{background:#0d1117}
.p3 .term{position:absolute;top:16px;left:20px;right:20px;font-family:"SF Mono",monospace;font-size:.65rem;line-height:1.8}
.p3 .term .g{color:#3fb950}.p3 .term .b{color:#58a6ff}.p3 .term .c{color:#8b949e}
.p3 .term .line{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.p3 .term .dot{width:5px;height:5px;border-radius:50%}
.p3 .term .dot:nth-child(1){background:#f85149}.p3 .term .dot:nth-child(2){background:#d2991d}.p3 .term .dot:nth-child(3){background:#3fb950}
.p3 .cursor{display:inline-block;width:5px;height:11px;background:#58a6ff;animation:blink 1s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Photographer preview */
.p4{background:#f5f0eb}
.p4 .photo-grid{position:absolute;inset:16px;display:grid;grid-template-columns:1.2fr 1fr;grid-template-rows:1fr 1fr;gap:6px}
.p4 .photo-grid div{border-radius:3px}
.p4 .photo-grid .big{background:#e0d5c5;grid-row:1/3}
.p4 .photo-grid .sm1{background:#d8cbb8}
.p4 .photo-grid .sm2{background:#d0c0a8}
.p4 .tag-line{position:absolute;bottom:14px;right:20px;font-family:Georgia,serif;font-size:.55rem;color:#c4754b;font-style:italic}

@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>🎨 作品集模板展示</h1>
<p class="sub">四种行业专属设计 · GitHub 永久托管 · 一键部署</p>

<div class="grid">
  <a class="card" href="designer.html">
    <div class="preview p1">
      <div class="mock"><div class="mock-bar"></div><div class="mock-row"><div class="mock-box"></div><div class="mock-box"></div></div><div class="mock-row"><div class="mock-box" style="height:40px"></div></div></div>
      <div class="mock-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="info"><h2>设计师 Portfolio</h2><p>极简白 + 卡片网格 · UI/UX/品牌</p></div>
  </a>
  <a class="card" href="editor.html">
    <div class="preview p2">
      <div class="badge">4K</div>
      <div class="film"><div class="strip"><div class="frame"></div><div class="frame"></div><div class="frame"></div></div><div class="timeline"></div><div class="scrub"></div></div>
    </div>
    <div class="info"><h2>剪辑师作品集</h2><p>暗黑电影风 · 横竖屏分区展示</p></div>
  </a>
  <a class="card" href="dev.html">
    <div class="preview p3">
      <div class="term">
        <div class="line"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="c">&nbsp;bash</span></div>
        <div><span class="g">$</span> <span class="b">whoami</span></div>
        <div><span class="b">wuzixuan</span><span class="c">&nbsp;— full-stack dev</span></div>
        <div><span class="g">$</span> <span class="b">ls</span> <span class="c">projects/</span></div>
        <div><span class="c">react-dashboard&nbsp; py-scheduler&nbsp; vue3-kit</span></div>
        <div><span class="g">$</span> <span class="cursor"></span></div>
      </div>
    </div>
    <div class="info"><h2>程序员简历站</h2><p>终端命令行风 · 项目+开源卡片</p></div>
  </a>
  <a class="card" href="photographer.html">
    <div class="preview p4">
      <div class="photo-grid"><div class="big"></div><div class="sm1"></div><div class="sm2"></div></div>
      <div class="tag-line">捕捉真实的情绪</div>
    </div>
    <div class="info"><h2>人像摄影师</h2><p>杂志风瀑布流 · 全屏大图展示</p></div>
  </a>
</div>
</div>
</body>
</html>
