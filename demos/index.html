<title>作品集模板展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0d1117;color:#c9d1d9;padding:2rem}
.container{max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:1.5rem;margin-bottom:.5rem;color:#58a6ff}
.sub{text-align:center;color:#8b949e;margin-bottom:2rem;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;transition:.25s;text-decoration:none;color:inherit}
.card:hover{border-color:#58a6ff;transform:translateY(-3px)}
.card .preview{aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;font-size:3rem}
.card .info{padding:1rem}
.card .info h2{font-size:1rem;color:#58a6ff;margin-bottom:4px}
.card .info p{font-size:.8rem;color:#8b949e}
.card .info .tag{display:inline-block;background:#1f2937;color:#58a6ff;padding:2px 8px;border-radius:3px;font-size:.7rem;margin-top:.5rem}
.p1{background:linear-gradient(135deg,#fafafa,#e8e0f0)}.p1 span{font-size:4rem}
.p2{background:linear-gradient(135deg,#0a0a0c,#1a1a00)}
.p3{background:linear-gradient(135deg,#0d1117,#0d1f17)}
.p4{background:linear-gradient(135deg,#f5f0eb,#e8d5c0)}

</head>
