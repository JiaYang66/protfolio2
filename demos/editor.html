<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>周野 · Video Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0c;--text:#c0c0c0;--accent:#f0a500}
body{font-family:"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.hero{text-align:center;padding:6rem 1.5rem 3rem;border-bottom:1px solid #1a1a1a}
.hero .badge{display:inline-block;border:1px solid var(--accent);color:var(--accent);padding:4px 16px;font-size:.7rem;letter-spacing:3px;margin-bottom:1.5rem;text-transform:uppercase}
.hero h1{font-size:3.5rem;font-weight:900;letter-spacing:12px;color:#fff;text-transform:uppercase}
.hero .title{font-size:.9rem;color:#666;margin:.5rem 0 2rem;letter-spacing:2px}
.hero .skills{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
.hero .skills span{font-size:.7rem;padding:3px 10px;border:1px solid #333;color:#888;letter-spacing:1px}
.container{max-width:1300px;margin:0 auto;padding:0 2rem}
.section{padding:3rem 0}
.section h2{font-size:.85rem;color:var(--accent);letter-spacing:4px;margin-bottom:1.5rem;text-transform:uppercase;text-align:center}
.v-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1.2rem}
.v-grid.port{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));justify-content:center}
.v-card{background:#111;border-radius:6px;overflow:hidden;border:1px solid #1a1a1a;transition:.2s}
.v-card:hover{border-color:#333}
.v-card.landscape .player{aspect-ratio:16/9}
.v-card.portrait .player{aspect-ratio:9/16}
.v-card .player{position:relative;background:#0a0a0a}
.v-card .player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.v-card .meta{padding:.8rem 1rem}
.v-card .meta h3{font-size:.85rem;font-weight:500;color:#ddd;margin-bottom:2px}
.v-card .meta p{font-size:.7rem;color:#555}
.footer{text-align:center;padding:3rem 0;color:#333;font-size:.7rem;border-top:1px solid #111;letter-spacing:2px}
.about{max-width:600px;margin:0 auto;text-align:center;font-size:.85rem;color:#666;line-height:2}
</style>
</head>
<body>
<div class="hero">
  <div class="badge">Video Editor</div>
  <h1>周 野</h1>
  <p class="title">剪辑师 · 短视频导演 · 用节奏讲故事</p>
  <div class="skills"><span>PR</span><span>达芬奇</span><span>AE</span><span>剪映</span><span>节奏控制</span><span>音效设计</span></div>
</div>

<div class="container">
  <div class="section">
    <h2>商业剪辑</h2>
    <div class="v-grid">
      <div class="v-card landscape"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV141Kn69EEY&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>品牌TVC — 情感叙事剪辑</h3><p>41s · 4K</p></div></div>
      <div class="v-card landscape"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV141Kn69Ep1&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>产品广告 — 快节奏剪辑</h3><p>53s · 4K</p></div></div>
    </div>
  </div>

  <div class="section">
    <h2>信息流广告</h2>
    <div class="v-grid port">
      <div class="v-card portrait"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1QqKn6FEMA&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>抖音信息流 — 高转化</h3><p>59s</p></div></div>
      <div class="v-card portrait"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1hqKn6FE4g&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>带货视频 — 口播混剪</h3><p>53s</p></div></div>
      <div class="v-card portrait"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1DqKn6FEr2&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>促销短片 — 15秒快闪</h3><p>22s</p></div></div>
    </div>
  </div>

  <div class="section">
    <h2>个人创作</h2>
    <div class="v-grid">
      <div class="v-card landscape"><div class="player"><iframe src="https://player.bilibili.com/player.html?bvid=BV1QqKn6FENc&page=1&high_quality=1&autoplay=0" allowfullscreen></iframe></div><div class="meta"><h3>Vlog旅拍 — 调色与节奏</h3><p>40s · 4K</p></div></div>
    </div>
  </div>

  <div class="section">
    <h2>关于</h2>
    <div class="about"><p>专注短视频剪辑与内容创作，服务美的、三只松鼠、茶颜悦色等品牌。从素材到成片，用剪辑让内容活起来。</p></div>
  </div>
</div>
<div class="footer">ZHOU YE · VIDEO EDITOR © 2026</div>
</body>
</html>
