<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>作品集 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:1rem;color:#58a6ff}
.topbar button{padding:8px 20px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:bold}
.topbar button:hover{background:#2ea043}
.topbar .tabs{display:flex;gap:.5rem}
.topbar .tab{padding:6px 16px;border-radius:4px;cursor:pointer;font-size:.85rem;color:#8b949e;border:1px solid transparent}
.topbar .tab.active{background:#1f2937;color:#58a6ff;border-color:#30363d}
.main{max-width:1000px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:320px 1fr;gap:1.5rem}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.2rem}
.panel h2{font-size:.95rem;color:#58a6ff;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #30363d}
label{display:block;font-size:.78rem;color:#8b949e;margin:.8rem 0 .2rem}
input,textarea,select{width:100%;padding:8px 10px;background:#0d1117;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;font-size:.82rem;font-family:"Microsoft YaHei",sans-serif;transition:border-color .2s}
input:focus,textarea:focus{border-color:#58a6ff;outline:none}
textarea{height:70px;resize:vertical}
.actions{margin-top:1rem;display:flex;gap:.5rem}
.actions button{padding:6px 14px;border-radius:4px;font-size:.78rem;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#c9d1d9}
.actions button.primary{background:#238636;color:#fff;border-color:#238636}
.actions button.danger{background:#da3633;color:#fff;border-color:#da3633}
.actions button:hover{opacity:.85}

.list{display:flex;flex-direction:column;gap:.5rem;max-height:calc(100vh - 200px);overflow-y:auto}
.item{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:.8rem;cursor:pointer;transition:.15s;display:flex;justify-content:space-between;align-items:center}
.item:hover{border-color:#58a6ff}
.item.active{border-color:#58a6ff;background:#1a2332}
.item .info h4{font-size:.82rem;color:#c9d1d9;margin-bottom:2px}
.item .info p{font-size:.72rem;color:#8b949e}
.item .del{color:#da3633;cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:3px;opacity:.5}
.item .del:hover{opacity:1;background:#2a1a1a}
.empty{text-align:center;color:#484f58;padding:2rem;font-size:.8rem}
.empty .add{color:#58a6ff;cursor:pointer;display:block;margin-top:.5rem}

.detail{padding:.5rem 0}
.detail .row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.detail .row3{grid-template-columns:1fr 1fr 1fr}
.msg{position:fixed;top:1rem;right:1rem;padding:10px 20px;border-radius:6px;font-size:.8rem;z-index:100;animation:slideIn .3s}
.msg.ok{background:#1a3a1a;color:#3fb950;border:1px solid #238636}
.msg.err{background:#3a1a1a;color:#f85149;border:1px solid #da3633}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.fade{animation:fadeOut 2s forwards}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0}}

.preview-area{margin-top:1rem}
.preview-area img{max-width:150px;max-height:100px;border-radius:4px;margin:4px}
.photo-cat{margin-bottom:1rem}
.photo-cat h3{font-size:.82rem;color:#58a6ff;margin-bottom:.4rem}
.photo-cat .photo-list{display:flex;flex-wrap:wrap;gap:6px}
.photo-item{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:4px 10px;font-size:.75rem;display:flex;align-items:center;gap:8px}
.photo-item .fn{color:#c9d1d9}
.photo-item .rm{color:#da3633;cursor:pointer;font-weight:bold}
.add-row{display:flex;gap:.5rem;margin-top:.4rem}
.add-row input{flex:1;font-size:.75rem}
.add-row button{font-size:.75rem;white-space:nowrap}
</style>
</head>
<body>

<div class="topbar"><div style=display:flex;align-items:center;gap:.5rem>
  <h1>📝 作品集管理后台</h1>
  <input id=tokenInput type=password placeholder="GitHub Token" style="width:280px;padding:6px 10px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:.8rem" onchange="TOKEN=this.value">
  <button onclick="publish()" title="发布到 GitHub">🚀 发布更新</button>
</div>

<div class="main">
  <!-- LEFT: item list -->
  <div>
    <div class="panel">
      <h2>🎬 视频作品 <span style="font-weight:normal;color:#8b949e;font-size:.7rem;float:right;cursor:pointer;color:#58a6ff" onclick="addVideo()">+ 新建</span></h2>
      <div class="list" id="videoList"></div>
    </div>
    <div class="panel" style="margin-top:1rem">
      <h2>📷 照片分类 <span style="font-weight:normal;color:#8b949e;font-size:.7rem;float:right;cursor:pointer;color:#58a6ff" onclick="addPhotoCat()">+ 新建</span></h2>
      <div class="list" id="photoCatList"></div>
    </div>
  </div>

  <!-- RIGHT: editor -->
  <div>
    <div class="panel" id="panelInfo">
      <h2>基本信息</h2>
      <div class="detail">
        <div class="row"><div><label>姓名</label><input id="fName"></div><div><label>职业定位</label><input id="fTitle" placeholder="如：视觉内容创作者"></div></div>
        <div class="row row3"><div><label>手机</label><input id="fPhone"></div><div><label>邮箱</label><input id="fEmail"></div><div><label>城市</label><input id="fLocation"></div></div>
        <label>一句话介绍</label><input id="fBio" placeholder="30字以内">
        <label>个人介绍</label><textarea id="fAbout" placeholder="100字以内..."></textarea>
        <label>技能标签（逗号分开）</label><input id="fSkills" placeholder="产品摄影,PR剪辑,航拍">
        <label>社交链接</label>
        <div class="row row3"><div><input id="fDy" placeholder="抖音链接"></div><div><input id="fBili" placeholder="B站链接"></div><div><input id="fXhs" placeholder="小红书链接"></div></div>
      </div>
    </div>

    <div class="panel" id="panelVideo" style="display:none">
      <h2>编辑视频</h2>
      <div class="detail">
        <label>标题</label><input id="vTitle">
        <div class="row"><div><label>BV号</label><input id="vBvid"></div><div><label>时长</label><input id="vDur" placeholder="如：35s"></div></div>
        <div class="row row3">
          <div><label>方向</label><select id="vType"><option>横屏</option><option>竖屏</option></select></div>
          <div><label>分类</label><input id="vCat" placeholder="如：产品宣传片"></div>
          <div><label>标签</label><input id="vTags" placeholder="逗号分开"></div>
        </div>
        <div class="actions">
          <button class="primary" onclick="saveVideo()">💾 保存</button>
          <button class="danger" onclick="deleteVideo()" id="btnDelVideo">🗑 删除</button>
          <button onclick="cancelVideo()">取消</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panelPhoto" style="display:none">
      <h2 id="photoCatTitle">编辑分类</h2>
      <div class="photo-cat">
        <div class="photo-list" id="photoFiles"></div>
        <div class="add-row">
          <input id="newPhotoFile" placeholder="照片文件名，如 photo1.jpg">
          <button class="primary" onclick="addPhotoFile()">+ 添加</button>
        </div>
      </div>
      <div class="actions" style="margin-top:1rem">
        <button class="danger" onclick="deletePhotoCat()">🗑 删除分类</button>
      </div>
    </div>
  </div>
</div>

<script>
const REPO='JiaYang66/protfolio2';
let TOKEN='';
let DATA={videos:[],photos:{}};
let selectedVideo=-1,selectedPhotoCat=-1;

function toast(msg,ok){const d=document.createElement('div');d.className='msg '+(ok?'ok':'err');d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.classList.add('fade'),2000);setTimeout(()=>d.remove(),4000)}

function showPanel(id){['panelInfo','panelVideo','panelPhoto'].forEach(p=>document.getElementById(p).style.display=p===id?'block':'none')}
function showInfo(){showPanel('panelInfo');selectedVideo=-1;selectedPhotoCat=-1;renderLists()}
function selectVideo(i){selectedVideo=i;selectedPhotoCat=-1;showPanel('panelVideo');renderLists();const v=DATA.videos[i];if(!v)return;document.getElementById('vTitle').value=v.title||'';document.getElementById('vBvid').value=v.bvid||'';document.getElementById('vDur').value=v.duration||'';document.getElementById('vType').value=v.type||'横屏';document.getElementById('vCat').value=v.category||'';document.getElementById('vTags').value=v.tags||''}
function selectPhotoCat(i){selectedPhotoCat=i;selectedVideo=-1;showPanel('panelPhoto');renderLists();renderPhotoFiles(i)}
function cancelVideo(){selectedVideo=-1;showInfo()}

function renderLists(){
  const vl=document.getElementById('videoList');
  if(!DATA.videos.length){vl.innerHTML='<div class=empty>暂无视频<br><span class=add onclick=addVideo()>+ 添加第一个视频</span></div>';return}
  vl.innerHTML=DATA.videos.map((v,i)=>'<div class="item'+(selectedVideo===i?' active':'')+'" onclick=selectVideo('+i+')><div class=info><h4>'+(v.title||'未命名视频')+'</h4><p>'+v.bvid+' · '+v.type+'</p></div><span class=del onclick="event.stopPropagation();deleteVideo('+i+')">🗑</span></div>').join('');

  const pl=document.getElementById('photoCatList');
  const cats=Object.keys(DATA.photos);
  if(!cats.length){pl.innerHTML='<div class=empty>暂无照片分类<br><span class=add onclick=addPhotoCat()>+ 添加第一个分类</span></div>';return}
  pl.innerHTML=cats.map((c,i)=>'<div class="item'+(selectedPhotoCat===i?' active':'')+'" onclick=selectPhotoCat('+i+')><div class=info><h4>'+c+'</h4><p>'+(DATA.photos[c]||[]).length+' 张照片</p></div><span class=del onclick="event.stopPropagation();deletePhotoCat('+i+')">🗑</span></div>').join('');
}

function renderPhotoFiles(i){
  const cats=Object.keys(DATA.photos);
  if(i<0||i>=cats.length) return;
  const cat=cats[i];
  document.getElementById('photoCatTitle').textContent='📷 '+cat;
  const el=document.getElementById('photoFiles');
  const files=DATA.photos[cat]||[];
  el.innerHTML=files.map((f,j)=>'<div class=photo-item><span class=fn>'+f+'</span><span class=rm onclick="removePhotoFile('+j+')">✕</span></div>').join('');
}

function addVideo(){
  DATA.videos.push({title:'新视频',bvid:'BVxxxxxx',duration:'30s',type:'横屏',category:'',tags:''});
  selectVideo(DATA.videos.length-1);
}

function saveVideo(){
  if(selectedVideo<0) return;
  DATA.videos[selectedVideo]={
    title:document.getElementById('vTitle').value,
    bvid:document.getElementById('vBvid').value,
    duration:document.getElementById('vDur').value,
    type:document.getElementById('vType').value,
    category:document.getElementById('vCat').value,
    tags:document.getElementById('vTags').value
  };
  renderLists();toast('视频已保存',true);
}

function deleteVideo(i){if(i===undefined)i=selectedVideo;if(i<0)return;DATA.videos.splice(i,1);selectedVideo=-1;renderLists();showInfo();toast('视频已删除',true)}

function addPhotoCat(){
  const name=prompt('分类名（如：川西、产品拍摄）：');
  if(!name) return;
  DATA.photos[name]=[];
  selectPhotoCat(Object.keys(DATA.photos).length-1);
}

function addPhotoFile(){
  const name=document.getElementById('newPhotoFile').value.trim();
  if(!name||selectedPhotoCat<0) return;
  const cats=Object.keys(DATA.photos);
  if(!DATA.photos[cats[selectedPhotoCat]]) DATA.photos[cats[selectedPhotoCat]]=[];
  DATA.photos[cats[selectedPhotoCat]].push(name);
  document.getElementById('newPhotoFile').value='';
  renderPhotoFiles(selectedPhotoCat);
  renderLists();
}

function removePhotoFile(j){
  if(selectedPhotoCat<0) return;
  const cats=Object.keys(DATA.photos);
  DATA.photos[cats[selectedPhotoCat]].splice(j,1);
  renderPhotoFiles(selectedPhotoCat);
  renderLists();
}

function deletePhotoCat(i){
  if(i===undefined)i=selectedPhotoCat;
  if(i<0) return;
  const cats=Object.keys(DATA.photos);
  delete DATA.photos[cats[i]];
  selectedPhotoCat=-1;
  renderLists();
  showInfo();
  toast('分类已删除',true);
}

function collectConfig(){
  const videos=DATA.videos.filter(v=>v.bvid);
  const groups=[],seen={};
  videos.forEach((v,i)=>{
    const key=v.category||v.type||'其他';
    if(!seen[key]){seen[key]=1;groups.push({label:key+' · '+v.type,layout:v.type,ids:[]})}
    groups.find(g=>g.label.startsWith(key)).ids.push(i);
  });
  return {
    name:document.getElementById('fName').value||'姓名',
    title:document.getElementById('fTitle').value,
    phone:document.getElementById('fPhone').value,
    email:document.getElementById('fEmail').value,
    location:document.getElementById('fLocation').value,
    bio:document.getElementById('fBio').value,
    about:document.getElementById('fAbout').value,
    skills:document.getElementById('fSkills').value,
    social:{douyin:document.getElementById('fDy').value,bilibili:document.getElementById('fBili').value,xiaohongshu:document.getElementById('fXhs').value},
    videos:videos,videoGroups:groups,photos:DATA.photos,avatar:''
  };
}

function publish(){
  const cfg=collectConfig();
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))));

  fetch('https://api.github.com/repos/'+REPO+'/contents/config.json',{
    headers:{'Authorization':'token '+TOKEN}
  }).then(r=>r.json()).then(info=>{
    return fetch('https://api.github.com/repos/'+REPO+'/contents/config.json',{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({message:'更新作品集',content:content,sha:info.sha||undefined})
    });
  }).then(r=>r.json()).then(d=>{
    if(d.content) toast('发布成功！30秒后刷新前台页面即可看到更新',true);
    else toast('发布失败：'+JSON.stringify(d),false);
  }).catch(e=>toast('网络错误：'+e.message,false));
}

// Load
fetch('config.json?'+Date.now()).then(r=>r.json()).then(c=>{
  DATA.videos=c.videos||[];
  DATA.photos=c.photos||{};
  document.getElementById('fName').value=c.name||'';
  document.getElementById('fTitle').value=c.title||'';
  document.getElementById('fPhone').value=c.phone||'';
  document.getElementById('fEmail').value=c.email||'';
  document.getElementById('fLocation').value=c.location||'';
  document.getElementById('fBio').value=c.bio||'';
  document.getElementById('fAbout').value=c.about||'';
  document.getElementById('fSkills').value=c.skills||'';
  if(c.social){document.getElementById('fDy').value=c.social.douyin||'';document.getElementById('fBili').value=c.social.bilibili||'';document.getElementById('fXhs').value=c.social.xiaohongshu||''}
  renderLists();
}).catch(()=>{renderLists();showInfo()});

// Init
showInfo();
</script>
</body>
</html>
